<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midnight Coach — Shop Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #060d1a;
  --bg2:    #0b1528;
  --card:   #0e1b30;
  --border: #1a2e4a;
  --text:   #e8f0fe;
  --text2:  #8aadcf;
  --text3:  #3d5a7a;
  --accent: #2563eb;
}

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg);
  font-family: 'Barlow', sans-serif;
  color: var(--text);
}

/* subtle animated grid bg */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  animation: gridScroll 30s linear infinite;
}
@keyframes gridScroll { to { background-position: 0 48px; } }

/* ── HEADER ── */
.header {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 72px;
  background: linear-gradient(180deg, #0b1832 0%, #060d1a 100%);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
/* thin accent line at very top */
.header::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, #1d4ed8, #2563eb, #3b82f6, #1d4ed8);
  background-size: 200% 100%;
  animation: shimmer 4s linear infinite;
}
@keyframes shimmer { to { background-position: -200% 0; } }

.header-left { display: flex; align-items: center; gap: 16px; }
.header-logo { width: 44px; height: 44px; border-radius: 10px; overflow: hidden; flex-shrink: 0; border: 1px solid rgba(59,130,246,0.3); }
.header-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 30px; font-weight: 800; letter-spacing: 0.01em;
  color: var(--text);
}
.header-sub { font-size: 12px; font-weight: 500; color: var(--text3); letter-spacing: 0.06em; margin-top: 2px; }

.header-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 8px;
}
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(0.8)} }
.live-label { font-size: 12px; font-weight: 600; letter-spacing: 0.05em; color: #22c55e; }

.header-right { display: flex; align-items: center; gap: 28px; }
.header-updated { font-size: 12px; color: var(--text3); font-weight: 500; text-align: right; }
.clock-wrap { text-align: right; }
.header-time {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 38px; font-weight: 800; color: var(--text);
  font-variant-numeric: tabular-nums; line-height: 1; letter-spacing: -0.01em;
}
.header-date { font-size: 12px; color: var(--text2); text-align: right; font-weight: 500; margin-top: 1px; }

/* ── MAIN AREA ── */
#mainArea {
  position: relative; z-index: 1;
  width: 100%;
  height: calc(100vh - 72px);
  padding: 20px;
  display: flex;
  flex-direction: column;
}

/* ── CARD GRID ── */
#cardGrid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
  align-items: stretch; /* cards stretch to fill row height */
  min-height: 0;
}

/* ── PERSON CARD ── */
.person-card {
  border-radius: 14px;
  border: 1px solid var(--border);
  border-top: 5px solid var(--border);
  background: var(--card);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: border-color 0.3s;
  animation: cardIn 0.4s ease both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-header {
  padding: 14px 16px 12px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.card-name {
  font-family: 'Barlow', sans-serif;
  font-size: 20px; font-weight: 800; letter-spacing: 0.01em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-badges { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.badge-overdue {
  font-size: 11px; font-weight: 800; padding: 3px 8px;
  border-radius: 10px; background: rgba(239,68,68,.18); color: #f87171;
  white-space: nowrap; letter-spacing: 0.04em;
}
.badge-count {
  font-size: 11px; font-weight: 700; padding: 3px 8px;
  border-radius: 10px; background: rgba(255,255,255,.07); color: var(--text2);
  white-space: nowrap;
}

/* ── TASK LIST (fills remaining card height) ── */
.card-tasks {
  padding: 10px 12px 12px;
  display: flex; flex-direction: column; gap: 6px;
  flex: 1;
  overflow: hidden;
}

.task-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px;
  border-radius: 9px;
  border: 1px solid transparent;
}
.task-row.t-overdue  { background: rgba(239,68,68,.08); border-color: rgba(239,68,68,.2); }
.task-row.t-progress { background: rgba(59,130,246,.07); border-color: rgba(59,130,246,.18); }
.task-row.t-done     { opacity: .28; }
.task-row.t-normal   { background: rgba(255,255,255,.03); }

.t-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }

.t-body { flex: 1; min-width: 0; }
.t-name {
  font-size: 16px; font-weight: 700; color: var(--text);
  white-space: normal;        /* WRAP instead of truncate */
  word-break: break-word;
  line-height: 1.3;
}
.t-name.done { text-decoration: line-through; color: var(--text3); }

.t-meta {
  display: flex; align-items: center; gap: 8px; margin-top: 4px; flex-wrap: wrap;
}
.t-bus {
  font-size: 12px; color: var(--text3); white-space: nowrap;
}
.t-due {
  font-size: 11px; font-weight: 700; color: #f87171; white-space: nowrap;
}

.t-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.t-flag {
  font-size: 13px; font-weight: 900; color: #f87171; flex-shrink: 0;
}
.t-status {
  font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 8px;
  white-space: nowrap; flex-shrink: 0;
}
.s-todo     { background: rgba(100,116,139,.2); color: #94a3b8; }
.s-progress { background: rgba(59,130,246,.22); color: #93c5fd; }
.s-hold     { background: rgba(245,158,11,.17); color: #fbbf24; }
.s-done     { background: rgba(16,185,129,.15); color: #6ee7b7; }

/* divider */
.done-divider {
  font-size: 11px; font-weight: 700; letter-spacing: .08em;
  color: var(--text3); padding: 6px 12px 2px; opacity: .7;
  border-top: 1px solid var(--border); margin-top: 2px;
}

/* ── ALL CLEAR ── */
.all-clear {
  grid-column: 1 / -1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 60vh; gap: 16px;
}
.all-clear-icon { font-size: 64px; }
.all-clear-text { font-family: 'Barlow', sans-serif; font-size: 28px; font-weight: 700; color: var(--text3); }

/* ── LOADING / ERROR ── */
#loadingScreen {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 24px;
  background: var(--bg); z-index: 99;
}
#loadingScreen.hide { display: none; }
.spin { width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: #3b82f6; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-label { font-family: 'Barlow', sans-serif; font-size: 18px; font-weight: 600; color: var(--text3); }

#errorScreen {
  position: fixed; inset: 0; display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  background: var(--bg); z-index: 98;
}
#errorScreen.show { display: flex; }
.err-icon { font-size: 56px; }
.err-msg  { font-family: 'Barlow', sans-serif; font-size: 20px; font-weight: 600; color: var(--text2); text-align: center; max-width: 420px; }
.err-retry{ font-size: 14px; color: var(--text3); }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div style="width:72px;height:72px;border-radius:16px;overflow:hidden;border:1px solid rgba(59,130,246,0.3)">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="72" height="72">
      <rect width="100" height="100" fill="#0f172a"/>
      <rect x="8" y="22" width="84" height="46" rx="7" fill="#3b82f6"/>
      <rect x="14" y="30" width="20" height="16" rx="3" fill="#dbeafe"/>
      <rect x="40" y="30" width="20" height="16" rx="3" fill="#dbeafe"/>
      <rect x="66" y="30" width="16" height="16" rx="3" fill="#dbeafe"/>
      <rect x="14" y="50" width="58" height="10" rx="2" fill="#bfdbfe"/>
      <rect x="74" y="34" width="14" height="22" rx="3" fill="#1d4ed8"/>
      <rect x="8" y="64" width="84" height="6" fill="#1e40af"/>
      <circle cx="24" cy="76" r="9" fill="#0f172a"/><circle cx="24" cy="76" r="5" fill="#1e293b"/><circle cx="24" cy="76" r="2.5" fill="#3b82f6"/>
      <circle cx="76" cy="76" r="9" fill="#0f172a"/><circle cx="76" cy="76" r="5" fill="#1e293b"/><circle cx="76" cy="76" r="2.5" fill="#3b82f6"/>
      <rect x="8" y="28" width="4" height="8" rx="2" fill="#fbbf24"/>
    </svg>
  </div>
  <div class="spin"></div>
  <div class="loading-label">Loading Dashboard...</div>
</div>

<!-- ERROR -->
<div id="errorScreen">
  <div class="err-icon">⚠️</div>
  <div class="err-msg" id="errorMsg">Unable to load dashboard</div>
  <div class="err-retry">Retrying in <span id="retryCountdown">30</span>s...</div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="44" height="44">
        <rect width="100" height="100" fill="#0f172a"/>
        <rect x="8" y="22" width="84" height="46" rx="7" fill="#3b82f6"/>
        <rect x="14" y="30" width="20" height="16" rx="3" fill="#dbeafe"/>
        <rect x="40" y="30" width="20" height="16" rx="3" fill="#dbeafe"/>
        <rect x="66" y="30" width="16" height="16" rx="3" fill="#dbeafe"/>
        <rect x="14" y="50" width="58" height="10" rx="2" fill="#bfdbfe"/>
        <rect x="74" y="34" width="14" height="22" rx="3" fill="#1d4ed8"/>
        <rect x="8" y="64" width="84" height="6" fill="#1e40af"/>
        <circle cx="24" cy="76" r="9" fill="#0f172a"/><circle cx="24" cy="76" r="5" fill="#1e293b"/><circle cx="24" cy="76" r="2.5" fill="#3b82f6"/>
        <circle cx="76" cy="76" r="9" fill="#0f172a"/><circle cx="76" cy="76" r="5" fill="#1e293b"/><circle cx="76" cy="76" r="2.5" fill="#3b82f6"/>
        <rect x="8" y="28" width="4" height="8" rx="2" fill="#fbbf24"/>
      </svg>
    </div>
    <div>
      <div class="header-title" id="headerTitle">Midnight Coach Tasks</div>
      <div class="header-sub" id="headerSub">Shop Task Manager</div>
    </div>
  </div>

  <div class="header-center">
    <div class="live-dot"></div>
    <div class="live-label">Live</div>
  </div>

  <div class="header-right">
    <div class="header-updated" id="lastUpdated">Updating...</div>
    <div class="clock-wrap">
      <div class="header-time" id="clockTime">--:--</div>
      <div class="header-date" id="clockDate"></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="mainArea">
  <div id="cardGrid"></div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzlxKOJrnG7jR627iux0W1X4-lgS2-PNugRs8b9P_4pVhC5ItdyFZM3rvfekFc7jD4S7g/exec';
const REFRESH = 90000;
const PRI = { 'High':0, 'Medium':1, 'Low':2 };
let refreshTimer = null, retryTimer = null;

// ── CLOCK ──
function tick() {
  const n = new Date();
  const h = n.getHours() % 12 || 12;
  const m = String(n.getMinutes()).padStart(2,'0');
  const ap = n.getHours() >= 12 ? 'PM' : 'AM';
  document.getElementById('clockTime').textContent = h + ':' + m + ' ' + ap;
  document.getElementById('clockDate').textContent = n.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}
tick(); setInterval(tick, 1000);

// ── API ──
async function fetchData() {
  const r = await fetch(API, {
    method:'POST', headers:{'Content-Type':'text/plain'},
    body: JSON.stringify({ action:'getDashboardData' }), redirect:'follow'
  });
  const txt = await r.text();
  try { return JSON.parse(txt); }
  catch { const m=txt.match(/\{[\s\S]*\}/); if(m) return JSON.parse(m[0]); throw new Error('Bad response'); }
}

// ── RENDER ──
function render(raw) {
  const { personMap={}, peopleOrder=[], config={} } = raw;

  if (config.app_title)    document.getElementById('headerTitle').textContent = config.app_title;
  if (config.app_subtitle) document.getElementById('headerSub').textContent   = config.app_subtitle;

  const today = new Date(); today.setHours(0,0,0,0);
  const grid  = document.getElementById('cardGrid');
  grid.innerHTML = '';

  const active = (peopleOrder||[]).filter(name => {
    const e = personMap[name];
    return e && e.tasks && e.tasks.some(t => t.status !== 'Cancelled');
  });

  if (!active.length) {
    grid.innerHTML = `
      <div class="all-clear">
        <div class="all-clear-icon">✅</div>
        <div class="all-clear-text">All Clear — No Active Tasks</div>
      </div>`;
    return;
  }

  // Stagger card animation
  active.forEach((name, idx) => {
    const entry  = personMap[name];
    const color  = (entry.person && entry.person.color) || '#64748b';
    const tasks  = (entry.tasks || []).filter(t => t.status !== 'Cancelled');

    const activeTasks = tasks.filter(t => t.status !== 'Done');
    const doneTasks   = tasks.filter(t => t.status === 'Done');

    activeTasks.sort((a,b) => {
      const aOv = a.due_date && new Date(a.due_date+'T00:00:00') < today;
      const bOv = b.due_date && new Date(b.due_date+'T00:00:00') < today;
      if (aOv && !bOv) return -1;
      if (!aOv && bOv) return 1;
      return (PRI[a.priority]||99) - (PRI[b.priority]||99);
    });

    doneTasks.sort((a,b) => {
      const at = a.completed_at ? new Date(a.completed_at) : new Date(0);
      const bt = b.completed_at ? new Date(b.completed_at) : new Date(0);
      return bt - at;
    });

    const overdueCnt = activeTasks.filter(t =>
      t.due_date && new Date(t.due_date+'T00:00:00') < today
    ).length;

    const card = document.createElement('div');
    card.className = 'person-card';
    card.style.borderTopColor = color;
    card.style.background = color + '0d';
    card.style.animationDelay = (idx * 60) + 'ms';

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'card-header';
    hdr.style.borderBottomColor = color + '35';

    const nameEl = document.createElement('div');
    nameEl.className = 'card-name';
    nameEl.style.color = color;
    nameEl.textContent = name;

    const badges = document.createElement('div');
    badges.className = 'card-badges';
    if (overdueCnt > 0) {
      const ob = document.createElement('span');
      ob.className = 'badge-overdue';
      ob.textContent = overdueCnt + ' overdue';
      badges.appendChild(ob);
    }
    const cb = document.createElement('span');
    cb.className = 'badge-count';
    cb.textContent = activeTasks.length + ' task' + (activeTasks.length!==1?'s':'');
    badges.appendChild(cb);

    hdr.appendChild(nameEl);
    hdr.appendChild(badges);
    card.appendChild(hdr);

    // Tasks
    const taskList = document.createElement('div');
    taskList.className = 'card-tasks';

    activeTasks.forEach(t => {
      taskList.appendChild(makeTaskRow(t, color, today));
    });

    if (doneTasks.length > 0) {
      const divider = document.createElement('div');
      divider.className = 'done-divider';
      divider.textContent = 'Recently done';
      taskList.appendChild(divider);
      doneTasks.slice(0, 3).forEach(t => {
        taskList.appendChild(makeTaskRow(t, color, today));
      });
    }

    card.appendChild(taskList);
    grid.appendChild(card);
  });
}

function makeTaskRow(task, color, today) {
  const isOverdue  = task.due_date && new Date(task.due_date+'T00:00:00') < today && task.status !== 'Done';
  const isDone     = task.status === 'Done';
  const isProgress = task.status === 'In Progress';

  const row = document.createElement('div');
  row.className = 'task-row ' + (isOverdue?'t-overdue':isDone?'t-done':isProgress?'t-progress':'t-normal');

  // Dot
  const dot = document.createElement('div');
  dot.className = 't-dot';
  dot.style.background = isOverdue ? '#ef4444' : isDone ? '#10b981' : isProgress ? '#3b82f6' : color;
  row.appendChild(dot);

  // Body (name + meta)
  const body = document.createElement('div');
  body.className = 't-body';

  const nm = document.createElement('div');
  nm.className = 't-name' + (isDone?' done':'');
  nm.textContent = task.task_name;
  body.appendChild(nm);

  const meta = document.createElement('div');
  meta.className = 't-meta';
  if (task.bus) {
    const b = document.createElement('span');
    b.className = 't-bus';
    b.textContent = '🚌 ' + task.bus;
    meta.appendChild(b);
  }
  if (isOverdue && task.due_date) {
    const d = document.createElement('span');
    d.className = 't-due';
    const due = new Date(task.due_date+'T00:00:00');
    d.textContent = 'Due ' + due.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    meta.appendChild(d);
  }
  if (meta.children.length) body.appendChild(meta);

  row.appendChild(body);

  // Right side: flag or status
  const right = document.createElement('div');
  right.className = 't-right';
  if (isOverdue) {
    const f = document.createElement('div');
    f.className = 't-flag';
    f.textContent = '!';
    right.appendChild(f);
  } else if (!isDone) {
    const s = document.createElement('div');
    s.className = 't-status ' + statusClass(task.status);
    s.textContent = shortStatus(task.status);
    right.appendChild(s);
  }
  if (right.children.length) row.appendChild(right);

  return row;
}

function statusClass(s) {
  if (s==='In Progress') return 's-progress';
  if (s==='On Hold')     return 's-hold';
  if (s==='Done')        return 's-done';
  return 's-todo';
}
function shortStatus(s) {
  if (s==='In Progress') return 'In Progress';
  if (s==='On Hold')     return 'On Hold';
  return s;
}

// ── LOAD & REFRESH ──
async function load(isRefresh) {
  if (!isRefresh) {
    document.getElementById('loadingScreen').classList.remove('hide');
    document.getElementById('errorScreen').classList.remove('show');
  }
  try {
    const data = await fetchData();
    const raw  = (data && data.data) ? data.data : data;
    document.getElementById('loadingScreen').classList.add('hide');
    document.getElementById('errorScreen').classList.remove('show');
    render(raw);
    document.getElementById('lastUpdated').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    clearTimeout(refreshTimer);
    clearTimeout(retryTimer);
    refreshTimer = setTimeout(() => load(true), REFRESH);
  } catch(e) {
    console.error(e);
    document.getElementById('loadingScreen').classList.add('hide');
    if (!isRefresh) document.getElementById('errorScreen').classList.add('show');
    startRetry();
  }
}

function startRetry() {
  let s = 30; clearTimeout(retryTimer);
  const el = document.getElementById('retryCountdown');
  const t = () => { if(s<=0){load(false);return;} if(el)el.textContent=s; s--; retryTimer=setTimeout(t,1000); };
  t();
}

load(false);
</script>
</body>
</html>
