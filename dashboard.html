<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midnight Coach — Shop Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080f1e;
  --bg2: #0f172a;
  --card: #111827;
  --border: #1e293b;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #475569;
}

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: var(--text);
}

/* ── HEADER ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 52px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-logo { width: 32px; height: 32px; border-radius: 7px; overflow: hidden; flex-shrink: 0; }
.header-title { font-size: 18px; font-weight: 800; color: var(--text); }
.header-sub   { font-size: 11px; color: var(--text3); }
.header-right { display: flex; align-items: center; gap: 20px; }
.header-updated { font-size: 11px; color: var(--text3); }
.header-time { font-size: 26px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; line-height: 1; }
.header-date { font-size: 11px; color: var(--text2); text-align: right; }

/* ── SCROLL AREA ── */
#scrollArea {
  width: 100%;
  height: calc(100vh - 52px);
  overflow-y: auto;
  overflow-x: hidden;
  padding: 14px;
}

/* ── CARD GRID ── */
#cardGrid {
  display: grid;
  /* Cards are at least 240px wide, max 400px, fill available space */
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 12px;
  align-items: start; /* cards only as tall as content */
}

/* ── PERSON CARD ── */
.person-card {
  border-radius: 12px;
  border: 1px solid var(--border);
  border-top: 4px solid var(--border);
  background: var(--card);
  overflow: hidden;
  /* NO fixed height — grows with content */
}

.card-header {
  padding: 10px 12px 8px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}
.card-name {
  font-size: 15px; font-weight: 800;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-badges { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.badge-overdue {
  font-size: 10px; font-weight: 800; padding: 2px 6px;
  border-radius: 10px; background: rgba(239,68,68,.15); color: #f87171;
  white-space: nowrap;
}
.badge-count {
  font-size: 10px; font-weight: 700; padding: 2px 6px;
  border-radius: 10px; background: rgba(255,255,255,.07); color: var(--text2);
  white-space: nowrap;
}

/* ── TASK ROWS ── */
.card-tasks { padding: 6px 8px 8px; display: flex; flex-direction: column; gap: 4px; }

.task-row {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 8px; border-radius: 7px;
  border: 1px solid transparent;
  min-height: 32px;
}
.task-row.t-overdue { background: rgba(239,68,68,.07); border-color: rgba(239,68,68,.18); }
.task-row.t-progress { background: rgba(59,130,246,.06); border-color: rgba(59,130,246,.15); }
.task-row.t-done { opacity: .32; }
.task-row.t-normal { background: rgba(255,255,255,.025); }

.t-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.t-name {
  flex: 1; font-size: 13px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.2;
}
.t-name.done { text-decoration: line-through; color: var(--text3); }

.t-bus {
  font-size: 10px; color: var(--text3); white-space: nowrap; flex-shrink: 0;
}
.t-flag {
  font-size: 10px; font-weight: 800; color: #f87171; flex-shrink: 0;
}
.t-status {
  font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 8px;
  white-space: nowrap; flex-shrink: 0;
}
.s-todo     { background: rgba(100,116,139,.2); color: #94a3b8; }
.s-progress { background: rgba(59,130,246,.2);  color: #93c5fd; }
.s-hold     { background: rgba(245,158,11,.15); color: #fbbf24; }
.s-done     { background: rgba(16,185,129,.15); color: #6ee7b7; }

/* divider between active and done tasks */
.done-divider {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text3);
  padding: 4px 8px 2px; opacity: .6;
}

/* ── ALL CLEAR ── */
.all-clear {
  grid-column: 1 / -1;
  display: flex; align-items: center; justify-content: center;
  min-height: calc(100vh - 100px);
  font-size: 22px; font-weight: 700; color: var(--text3);
}

/* ── LOADING / ERROR ── */
#loadingScreen {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
  background: var(--bg); z-index: 99;
}
#loadingScreen.hide { display: none; }
.spin { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: #3b82f6; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

#errorScreen {
  position: fixed; inset: 0; display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  background: var(--bg); z-index: 98;
}
#errorScreen.show { display: flex; }
.err-icon { font-size: 44px; }
.err-msg  { font-size: 17px; color: var(--text2); text-align: center; max-width: 380px; }
.err-retry{ font-size: 13px; color: var(--text3); }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div style="width:60px;height:60px;border-radius:14px;overflow:hidden">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="60" height="60">
      <rect width="100" height="100" fill="#0f172a"/>
      <rect x="8" y="22" width="84" height="46" rx="7" fill="#3b82f6"/>
      <rect x="14" y="30" width="20" height="16" rx="3" fill="#dbeafe"/>
      <rect x="40" y="30" width="20" height="16" rx="3" fill="#dbeafe"/>
      <rect x="66" y="30" width="16" height="16" rx="3" fill="#dbeafe"/>
      <rect x="14" y="50" width="58" height="10" rx="2" fill="#bfdbfe"/>
      <rect x="74" y="34" width="14" height="22" rx="3" fill="#1d4ed8"/>
      <rect x="8" y="64" width="84" height="6" fill="#1e40af"/>
      <circle cx="24" cy="76" r="9" fill="#0f172a"/><circle cx="24" cy="76" r="5" fill="#1e293b"/><circle cx="24" cy="76" r="2.5" fill="#3b82f6"/>
      <circle cx="76" cy="76" r="9" fill="#0f172a"/><circle cx="76" cy="76" r="5" fill="#1e293b"/><circle cx="76" cy="76" r="2.5" fill="#3b82f6"/>
      <rect x="8" y="28" width="4" height="8" rx="2" fill="#fbbf24"/>
    </svg>
  </div>
  <div class="spin"></div>
  <div style="font-size:15px;color:var(--text3)">Loading dashboard...</div>
</div>

<!-- ERROR -->
<div id="errorScreen">
  <div class="err-icon">⚠️</div>
  <div class="err-msg" id="errorMsg">Unable to load dashboard.</div>
  <div class="err-retry">Retrying in <span id="retryCountdown">30</span>s...</div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="32" height="32">
        <rect width="100" height="100" fill="#0f172a"/>
        <rect x="8" y="22" width="84" height="46" rx="7" fill="#3b82f6"/>
        <rect x="14" y="30" width="20" height="16" rx="3" fill="#dbeafe"/>
        <rect x="40" y="30" width="20" height="16" rx="3" fill="#dbeafe"/>
        <rect x="66" y="30" width="16" height="16" rx="3" fill="#dbeafe"/>
        <rect x="14" y="50" width="58" height="10" rx="2" fill="#bfdbfe"/>
        <rect x="74" y="34" width="14" height="22" rx="3" fill="#1d4ed8"/>
        <rect x="8" y="64" width="84" height="6" fill="#1e40af"/>
        <circle cx="24" cy="76" r="9" fill="#0f172a"/><circle cx="24" cy="76" r="5" fill="#1e293b"/><circle cx="24" cy="76" r="2.5" fill="#3b82f6"/>
        <circle cx="76" cy="76" r="9" fill="#0f172a"/><circle cx="76" cy="76" r="5" fill="#1e293b"/><circle cx="76" cy="76" r="2.5" fill="#3b82f6"/>
        <rect x="8" y="28" width="4" height="8" rx="2" fill="#fbbf24"/>
      </svg>
    </div>
    <div>
      <div class="header-title" id="headerTitle">Midnight Coach Tasks</div>
      <div class="header-sub" id="headerSub">Shop Task Manager</div>
    </div>
  </div>
  <div class="header-right">
    <div class="header-updated" id="lastUpdated">Updating...</div>
    <div style="text-align:right">
      <div class="header-time" id="clockTime">--:--</div>
      <div class="header-date" id="clockDate"></div>
    </div>
  </div>
</div>

<!-- SCROLL + GRID -->
<div id="scrollArea">
  <div id="cardGrid"></div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzlxKOJrnG7jR627iux0W1X4-lgS2-PNugRs8b9P_4pVhC5ItdyFZM3rvfekFc7jD4S7g/exec';
const REFRESH = 90000;
const PRI = { 'High':0, 'Medium':1, 'Low':2 };
let refreshTimer = null, retryTimer = null;

// ── CLOCK ──────────────────────────────────────────────────────
function tick() {
  const n = new Date();
  const h = n.getHours() % 12 || 12;
  const m = String(n.getMinutes()).padStart(2,'0');
  const ap = n.getHours() >= 12 ? 'PM' : 'AM';
  document.getElementById('clockTime').textContent = h + ':' + m + ' ' + ap;
  document.getElementById('clockDate').textContent = n.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}
tick(); setInterval(tick, 1000);

// ── API ────────────────────────────────────────────────────────
async function fetchData() {
  const r = await fetch(API, {
    method:'POST', headers:{'Content-Type':'text/plain'},
    body: JSON.stringify({ action:'getDashboardData' }), redirect:'follow'
  });
  const txt = await r.text();
  try { return JSON.parse(txt); }
  catch { const m=txt.match(/\{[\s\S]*\}/); if(m) return JSON.parse(m[0]); throw new Error('Bad response'); }
}

// ── RENDER ─────────────────────────────────────────────────────
function render(raw) {
  const { personMap={}, peopleOrder=[], config={} } = raw;

  if (config.app_title)    document.getElementById('headerTitle').textContent = config.app_title;
  if (config.app_subtitle) document.getElementById('headerSub').textContent   = config.app_subtitle;

  const today = new Date(); today.setHours(0,0,0,0);
  const grid  = document.getElementById('cardGrid');
  grid.innerHTML = '';

  // Only people with at least one non-cancelled task
  const active = (peopleOrder||[]).filter(name => {
    const e = personMap[name];
    return e && e.tasks && e.tasks.some(t => t.status !== 'Cancelled');
  });

  if (!active.length) {
    grid.innerHTML = '<div class="all-clear">✅ All clear — no active tasks!</div>';
    return;
  }

  active.forEach(name => {
    const entry  = personMap[name];
    const color  = (entry.person && entry.person.color) || '#64748b';
    const tasks  = (entry.tasks || []).filter(t => t.status !== 'Cancelled');

    // Split into active and done
    const activeTasks = tasks.filter(t => t.status !== 'Done');
    const doneTasks   = tasks.filter(t => t.status === 'Done');

    // Sort active: overdue → priority
    activeTasks.sort((a,b) => {
      const aOv = a.due_date && new Date(a.due_date+'T00:00:00') < today;
      const bOv = b.due_date && new Date(b.due_date+'T00:00:00') < today;
      if (aOv && !bOv) return -1;
      if (!aOv && bOv) return 1;
      return (PRI[a.priority]||99) - (PRI[b.priority]||99);
    });

    // Sort done: newest completed first
    doneTasks.sort((a,b) => {
      const at = a.completed_at ? new Date(a.completed_at) : new Date(0);
      const bt = b.completed_at ? new Date(b.completed_at) : new Date(0);
      return bt - at;
    });

    const overdueCnt = activeTasks.filter(t =>
      t.due_date && new Date(t.due_date+'T00:00:00') < today
    ).length;

    // ── Build card ──
    const card = document.createElement('div');
    card.className = 'person-card';
    card.style.borderTopColor = color;
    card.style.background = color + '0d'; // 5% tint

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'card-header';
    hdr.style.borderBottomColor = color + '30';

    const nameEl = document.createElement('div');
    nameEl.className = 'card-name';
    nameEl.style.color = color;
    nameEl.textContent = name;

    const badges = document.createElement('div');
    badges.className = 'card-badges';
    if (overdueCnt > 0) {
      const ob = document.createElement('span');
      ob.className = 'badge-overdue';
      ob.textContent = overdueCnt + ' overdue';
      badges.appendChild(ob);
    }
    const cb = document.createElement('span');
    cb.className = 'badge-count';
    cb.textContent = activeTasks.length + ' task' + (activeTasks.length!==1?'s':'');
    badges.appendChild(cb);

    hdr.appendChild(nameEl);
    hdr.appendChild(badges);
    card.appendChild(hdr);

    // Tasks
    const taskList = document.createElement('div');
    taskList.className = 'card-tasks';

    // Active tasks
    activeTasks.forEach(t => {
      taskList.appendChild(makeTaskRow(t, color, today));
    });

    // Done tasks (show up to 3 most recent)
    if (doneTasks.length > 0) {
      const divider = document.createElement('div');
      divider.className = 'done-divider';
      divider.textContent = 'Recently done';
      taskList.appendChild(divider);
      doneTasks.slice(0, 3).forEach(t => {
        taskList.appendChild(makeTaskRow(t, color, today));
      });
    }

    card.appendChild(taskList);
    grid.appendChild(card);
  });
}

function makeTaskRow(task, color, today) {
  const isOverdue  = task.due_date && new Date(task.due_date+'T00:00:00') < today && task.status !== 'Done';
  const isDone     = task.status === 'Done';
  const isProgress = task.status === 'In Progress';

  const row = document.createElement('div');
  row.className = 'task-row ' + (isOverdue?'t-overdue':isDone?'t-done':isProgress?'t-progress':'t-normal');

  // Dot
  const dot = document.createElement('div');
  dot.className = 't-dot';
  dot.style.background = isOverdue ? '#ef4444' : isDone ? '#10b981' : isProgress ? '#3b82f6' : color;
  row.appendChild(dot);

  // Name
  const nm = document.createElement('div');
  nm.className = 't-name' + (isDone?' done':'');
  nm.textContent = task.task_name;
  row.appendChild(nm);

  // Bus
  if (task.bus) {
    const b = document.createElement('div');
    b.className = 't-bus';
    b.textContent = '🚌 ' + task.bus;
    row.appendChild(b);
  }

  // Overdue flag or status badge
  if (isOverdue) {
    const f = document.createElement('div');
    f.className = 't-flag';
    f.textContent = '!';
    row.appendChild(f);
  } else if (!isDone) {
    const s = document.createElement('div');
    s.className = 't-status ' + statusClass(task.status);
    s.textContent = shortStatus(task.status);
    row.appendChild(s);
  }

  return row;
}

function statusClass(s) {
  if (s==='In Progress') return 's-progress';
  if (s==='On Hold')     return 's-hold';
  if (s==='Done')        return 's-done';
  return 's-todo';
}
function shortStatus(s) {
  if (s==='In Progress') return 'In Progress';
  if (s==='On Hold')     return 'On Hold';
  return s;
}

// ── LOAD & REFRESH ─────────────────────────────────────────────
async function load(isRefresh) {
  if (!isRefresh) {
    document.getElementById('loadingScreen').classList.remove('hide');
    document.getElementById('errorScreen').classList.remove('show');
  }
  try {
    const data = await fetchData();
    const raw  = (data && data.data) ? data.data : data;
    document.getElementById('loadingScreen').classList.add('hide');
    document.getElementById('errorScreen').classList.remove('show');
    render(raw);
    document.getElementById('lastUpdated').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    clearTimeout(refreshTimer);
    clearTimeout(retryTimer);
    refreshTimer = setTimeout(() => load(true), REFRESH);
  } catch(e) {
    console.error(e);
    document.getElementById('loadingScreen').classList.add('hide');
    if (!isRefresh) document.getElementById('errorScreen').classList.add('show');
    startRetry();
  }
}

function startRetry() {
  let s = 30; clearTimeout(retryTimer);
  const el = document.getElementById('retryCountdown');
  const t = () => { if(s<=0){load(false);return;} if(el)el.textContent=s; s--; retryTimer=setTimeout(t,1000); };
  t();
}

load(false);
</script>
</body>
</html>
