<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midnight Coach — Shop Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #1a1f2e;
  --bg2:    #1e2436;
  --card:   #242b3d;
  --border: #2e3a52;
  --text:   #e4e9f4;
  --text2:  #8a99b8;
  --text3:  #5a6a88;
  --gap:    10px;
  --fs:     16px;   /* base font — JS overrides this */
}

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg);
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--text);
  font-size: var(--fs);
}

/* ── SAFE ZONE: keeps content off TV crop edges ── */
#safeZone {
  position: fixed;
  top: 30px; bottom: 30px; left: 40px; right: 40px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
.header {
  position: relative;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px;
  height: 52px;
  background: var(--bg2);
  border-radius: 10px;
  border: 1px solid var(--border);
  margin-bottom: var(--gap);
  flex-shrink: 0;
}
.header::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  border-radius: 10px 10px 0 0;
  background: linear-gradient(90deg, #1d4ed8, #3b82f6, #60a5fa, #3b82f6, #1d4ed8);
  background-size: 200% 100%;
  animation: shimmer 5s linear infinite;
}
@keyframes shimmer { to { background-position: -200% 0; } }

.header-left { display: flex; align-items: center; gap: 10px; }
.header-logo { width: 32px; height: 32px; border-radius: 7px; overflow: hidden; flex-shrink: 0; border: 1px solid rgba(59,130,246,0.25); }
.header-title { font-size: 1.2em; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
.header-sub   { font-size: 0.65em; font-weight: 400; color: var(--text3); margin-top: 1px; }

.header-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 6px;
}
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; animation: pulse 2.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.live-label { font-size: 0.72em; font-weight: 600; color: #22c55e; }

.header-right { display: flex; align-items: center; gap: 16px; }
.header-updated { font-size: 0.65em; color: var(--text3); }
.clock-wrap { text-align: right; }
.header-time { font-size: 1.8em; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; line-height: 1; letter-spacing: -0.02em; }
.header-date { font-size: 0.65em; color: var(--text2); text-align: right; margin-top: 1px; }

/* ── CARD GRID: JS sets columns and sizes ── */
#cardGrid {
  flex: 1;
  display: grid;
  /* columns and rows set by JS based on card count */
  gap: var(--gap);
  align-items: start;
  align-content: start;
  overflow: hidden;
  min-height: 0;
}

/* ── PERSON CARD ── */
.person-card {
  border-radius: 10px;
  border: 1px solid var(--border);
  border-top: 3px solid var(--border);
  background: var(--card);
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  animation: cardIn 0.35s ease both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── CARD HEADER ── */
.card-header {
  padding: 0.5em 0.75em;
  display: flex; align-items: center; justify-content: space-between;
  gap: 0.5em;
  border-bottom: 1px solid var(--border);
}
.card-name {
  font-size: 1.05em; font-weight: 700; letter-spacing: -0.01em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-badges { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.badge-overdue {
  font-size: 0.68em; font-weight: 600; padding: 1px 6px;
  border-radius: 20px; background: rgba(239,68,68,.15); color: #f87171;
  white-space: nowrap;
}
.badge-active {
  font-size: 0.68em; font-weight: 600; padding: 1px 6px;
  border-radius: 20px; background: rgba(59,130,246,.18); color: #93c5fd;
  white-space: nowrap;
}
.badge-tomorrow {
  font-size: 0.68em; font-weight: 600; padding: 1px 6px;
  border-radius: 20px; background: rgba(245,158,11,.18); color: #fbbf24;
  white-space: nowrap;
}
.badge-future {
  font-size: 0.68em; font-weight: 500; padding: 1px 6px;
  border-radius: 20px; background: rgba(255,255,255,.06); color: var(--text2);
  white-space: nowrap;
}

/* ── TASK LIST ── */
.card-tasks {
  padding: 0.4em 0.5em 0.5em;
  display: flex; flex-direction: column; gap: 3px;
}

.task-row {
  display: flex; align-items: flex-start; gap: 0.5em;
  padding: 0.4em 0.5em;
  border-radius: 6px;
  border: 1px solid transparent;
}
.task-row.t-overdue  { background: rgba(239,68,68,.07); border-color: rgba(239,68,68,.18); }
.task-row.t-progress { background: rgba(59,130,246,.06); border-color: rgba(59,130,246,.15); }
.task-row.t-done     { background: rgba(255,255,255,.02); border-color: rgba(255,255,255,.04); }
.task-row.t-normal   { background: rgba(255,255,255,.03); }

.t-dot { width: 0.45em; height: 0.45em; border-radius: 50%; flex-shrink: 0; margin-top: 0.38em; }

.t-body { flex: 1; min-width: 0; }
.t-name {
  font-size: 0.9em; font-weight: 600; color: var(--text);
  white-space: normal; word-break: break-word; line-height: 1.3;
}
.t-name.done {
  text-decoration: line-through;
  text-decoration-color: #f59e0b;
  text-decoration-thickness: 2px;
  color: var(--text2);
  font-weight: 500;
}
.t-meta {
  display: flex; align-items: center; gap: 0.4em; margin-top: 0.15em; flex-wrap: wrap;
}
.t-bus { font-size: 0.7em; color: var(--text3); }
.t-due { font-size: 0.7em; font-weight: 600; color: #f87171; }

.t-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
.t-flag  { font-size: 0.8em; font-weight: 700; color: #f87171; }
.t-status {
  font-size: 0.68em; font-weight: 600; padding: 1px 6px; border-radius: 20px;
  white-space: nowrap;
}
.s-todo     { background: rgba(100,116,139,.18); color: #94a3b8; }
.s-progress { background: rgba(59,130,246,.18);  color: #93c5fd; }
.s-hold     { background: rgba(245,158,11,.15);  color: #fbbf24; }
.s-done     { background: rgba(16,185,129,.15);  color: #6ee7b7; }

.done-divider {
  font-size: 0.65em; font-weight: 600; letter-spacing: .05em;
  color: var(--text3); padding: 0.4em 0.5em 0.15em;
  border-top: 1px solid var(--border); margin-top: 2px;
}
.more-indicator {
  font-size: 0.7em; color: var(--text3); font-weight: 500;
  padding: 0.2em 0.5em 0.35em; text-align: center;
}

/* ── ALL CLEAR ── */
.all-clear {
  grid-column: 1 / -1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 60vh; gap: 12px;
}
.all-clear-icon { font-size: 3em; }
.all-clear-text { font-size: 1.4em; font-weight: 600; color: var(--text3); }

/* ── LOADING / ERROR ── */
#loadingScreen {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 18px;
  background: var(--bg); z-index: 99;
}
#loadingScreen.hide { display: none; }
.spin { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: #3b82f6; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-label { font-size: 0.9em; font-weight: 500; color: var(--text3); }

#errorScreen {
  position: fixed; inset: 0; display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  background: var(--bg); z-index: 98;
}
#errorScreen.show { display: flex; }
.err-icon { font-size: 2.5em; }
.err-msg  { font-size: 1.1em; font-weight: 600; color: var(--text2); text-align: center; max-width: 400px; }
.err-retry{ font-size: 0.75em; color: var(--text3); }
</style>
<script src="config.js"></script>
</head>

      <circle cx="76" cy="76" r="9" fill="#1e2436"/><circle cx="76" cy="76" r="5" fill="#2e3a52"/><circle cx="76" cy="76" r="2.5" fill="#3b82f6"/>

<div id="safeZone">
  <div class="header">
    <div class="header-left">
      <div class="header-logo">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="32" height="32">
          <rect width="100" height="100" fill="#1e2436"/>
          <rect x="8" y="22" width="84" height="46" rx="7" fill="#3b82f6"/>
          <rect x="14" y="30" width="20" height="16" rx="3" fill="#dbeafe"/>
          <rect x="40" y="30" width="20" height="16" rx="3" fill="#dbeafe"/>
          <rect x="66" y="30" width="16" height="16" rx="3" fill="#dbeafe"/>
          <rect x="14" y="50" width="58" height="10" rx="2" fill="#bfdbfe"/>
          <rect x="74" y="34" width="14" height="22" rx="3" fill="#1d4ed8"/>
          <rect x="8" y="64" width="84" height="6" fill="#1e40af"/>
          <circle cx="24" cy="76" r="9" fill="#1e2436"/><circle cx="24" cy="76" r="5" fill="#2e3a52"/><circle cx="24" cy="76" r="2.5" fill="#3b82f6"/>
          <circle cx="76" cy="76" r="9" fill="#1e2436"/><circle cx="76" cy="76" r="5" fill="#2e3a52"/><circle cx="76" cy="76" r="2.5" fill="#3b82f6"/>
          <rect x="8" y="28" width="4" height="8" rx="2" fill="#fbbf24"/>

    <div class="header-center">
      <div class="live-dot"></div>

    </div>
    <div class="header-right">

  <div id="mainArea" style="flex:1;min-height:0;overflow:hidden;">

<script>
const API = MC_CONFIG.API;
const REFRESH = 90000;
const PRI     = { 'High':0, 'Medium':1, 'Low':2 };
let refreshTimer = null, retryTimer = null;
let lastRaw = null;

// ── CLOCK ──
function tick() {
  const n  = new Date();
  const h  = n.getHours() % 12 || 12;
  const m  = String(n.getMinutes()).padStart(2,'0');
  const ap = n.getHours() >= 12 ? 'PM' : 'AM';
  document.getElementById('clockTime').textContent = h + ':' + m + ' ' + ap;
  document.getElementById('clockDate').textContent = n.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}
tick(); setInterval(tick, 1000);

// ── LAYOUT CALCULATION ──
// Figures out the best grid layout and font size to fill the screen
function computeLayout(cardCount) {
  const grid     = document.getElementById('cardGrid');
  const mainArea = document.getElementById('mainArea');
  const W        = mainArea.clientWidth;
  const H        = mainArea.clientHeight;
  const GAP      = 10;

  // Try different column counts and pick the one that best fills the screen
  let bestCols = 1, bestScore = -1;

  for (let cols = 1; cols <= Math.min(cardCount, 8); cols++) {
    const rows    = Math.ceil(cardCount / cols);
    const cardW   = (W - GAP * (cols - 1)) / cols;
    const cardH   = (H - GAP * (rows - 1)) / rows;
    // Score: penalize very tall/narrow or very wide/flat cards
    const ratio   = cardW / cardH;
    const ideal   = 1.4; // ideal card aspect ratio
    const score   = 1 / (Math.abs(Math.log(ratio / ideal)) + 0.1);
    if (score > bestScore) { bestScore = score; bestCols = cols; }
  }

  const bestRows = Math.ceil(cardCount / bestCols);
  const cardW    = Math.floor((W - GAP * (bestCols - 1)) / bestCols);
  const cardH    = Math.floor((H - GAP * (bestRows - 1)) / bestRows);

  // Font size: scale so content fills the card height
  // Estimate: a task row is ~2.2em tall, card header ~2.5em
  // We'll set font and let the DOM confirm, then adjust
  const avgTasksPerCard = 5; // rough estimate
  const estimatedRows   = avgTasksPerCard * 2.2 + 2.5; // in em
  const fontSize        = Math.min(26, Math.max(11, cardH / estimatedRows));

  return { cols: bestCols, rows: bestRows, cardW, cardH, fontSize };
}

// ── RENDER ──
function render(raw) {
  const { personMap={}, peopleOrder=[], config={} } = raw;

  if (config.app_title)    document.getElementById('headerTitle').textContent = config.app_title;
  if (config.app_subtitle) document.getElementById('headerSub').textContent   = config.app_subtitle;

  const today = new Date(); today.setHours(0,0,0,0);
  const grid  = document.getElementById('cardGrid');
  grid.innerHTML = '';

  const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
  const dayAfter  = new Date(today); dayAfter.setDate(dayAfter.getDate() + 2);

  // Dashboard: show task if overdue, due today, do_today set, or in active date range
  function isShowToday(t) {
    if (t.status === 'Done' || t.status === 'Cancelled') return false;
    if (t.do_today === true || t.do_today === 'TRUE' || t.do_today === 'true') return true;

    const start = t.start_date ? new Date(t.start_date+'T00:00:00') : null;
    const due   = t.due_date   ? new Date(t.due_date+'T00:00:00')   : null;
    const tom   = new Date(today); tom.setDate(tom.getDate()+1);

    // Both dates — show if today is within range
    if (start && due) return today >= start && today <= due;
    // Due only — show if due today or overdue
    if (due)   return due < tom;
    // Start only — treat start as effective date
    if (start) return start < tom;
    return false;
  }

  // Show people who have active today tasks OR tasks completed today
  const active = (peopleOrder||[]).filter(name => {
    const e = personMap[name];
    if (!e || !e.tasks) return false;
    if (e.tasks.some(t => isShowToday(t))) return true;
    // Also include if they completed something today
    return e.tasks.some(t => {
      if (t.status !== 'Done' || !t.completed_at) return false;
      const compStr = t.completed_at.toString().replace(' ', 'T');
      const comp = new Date(compStr); comp.setHours(0,0,0,0);
      return comp.getTime() === today.getTime();
    });
  });

  if (!active.length) {
    grid.style.cssText = '';
    grid.innerHTML = `<div class="all-clear"><div class="all-clear-icon">✅</div><div class="all-clear-text">All clear — no active tasks</div></div>`;
    return;
  }

  // Compute layout
  const layout = computeLayout(active.length);
  // Font size is set per-card based on each card's task count

  // Set grid to exact columns, each card gets equal space
  grid.style.cssText = `
    display: grid;
    grid-template-columns: repeat(${layout.cols}, 1fr);
    grid-template-rows: repeat(${layout.rows}, 1fr);
    gap: 10px;
    height: 100%;
    overflow: hidden;
  `;

  // Each card calculates its own font size and task limit

  active.forEach((name, idx) => {
    const entry  = personMap[name];
    const color  = (entry.person && entry.person.color) || '#64748b';
    const tasks  = (entry.tasks || []).filter(t => t.status !== 'Cancelled');

    // todayTasks = what shows as full rows on the dashboard
    // allActiveTasks = everything not done (used for badge counts)
    const allActiveTasks = tasks.filter(t => t.status !== 'Done' && t.status !== 'Cancelled');
    const activeTasks    = allActiveTasks.filter(t => isShowToday(t));
    const doneTasks      = tasks.filter(t => {
      if (t.status !== 'Done') return false;
      if (!t.completed_at) return false;
      // Normalize date string — replace space with T for cross-browser ISO parsing
      const compStr = t.completed_at.toString().replace(' ', 'T');
      const comp = new Date(compStr); comp.setHours(0,0,0,0);
      return comp.getTime() === today.getTime();
    });

    activeTasks.sort((a,b) => {
      const aOv = a.due_date && new Date(a.due_date+'T00:00:00') < today;
      const bOv = b.due_date && new Date(b.due_date+'T00:00:00') < today;
      if (aOv && !bOv) return -1; if (!aOv && bOv) return 1;
      return (PRI[a.priority]||99) - (PRI[b.priority]||99);
    });
    doneTasks.sort((a,b) => new Date((b.completed_at||'').toString().replace(' ','T')||0) - new Date((a.completed_at||'').toString().replace(' ','T')||0));

    // Badge counts use ALL active tasks (not just today's shown tasks)
    // Each task counted in exactly one bucket
    const overdueCnt  = allActiveTasks.filter(t =>
      t.due_date && new Date(t.due_date+'T00:00:00') < today
    ).length;

    const todayCnt    = allActiveTasks.filter(t => isShowToday(t) &&
      !(t.due_date && new Date(t.due_date+'T00:00:00') < today)
    ).length;

    const tomorrowCnt = allActiveTasks.filter(t => {
      if (isShowToday(t)) return false;  // already counted above
      if (!t.due_date) return false;
      const d = new Date(t.due_date+'T00:00:00');
      return d >= tomorrow && d < dayAfter;
    }).length;

    // Future = everything else: due after tomorrow, or no due date (parking lot)
    const futureCnt   = allActiveTasks.filter(t => {
      if (isShowToday(t)) return false;  // already counted
      if (!t.due_date) return true;      // parking lot = future
      const d = new Date(t.due_date+'T00:00:00');
      return d >= dayAfter;
    }).length;

    // Per-card font sizing:
    // Total items = active tasks + (done divider + 2 done rows if any) + (more row if needed)
    // Estimate rows needed, then shrink font to fit card height
    const doneRows   = doneTasks.length > 0 ? doneTasks.length + 1 : 0; // divider + all done today
    const totalItems = activeTasks.length + doneRows;
    const cardH        = layout.cardH;
    const HEADER_EM    = 2.5;  // card header height in em
    const ROW_EM       = 2.3;  // one task row height in em

    // Binary search for the largest font that fits all tasks
    let cardFs = layout.fontSize; // start at global estimate
    for (let fs = 26; fs >= 9; fs -= 0.5) {
      const headerPx = HEADER_EM * fs;
      const rowPx    = ROW_EM * fs;
      const fitsRows = Math.floor((cardH - headerPx) / rowPx);
      if (fitsRows >= totalItems) { cardFs = fs; break; }
      if (fs <= 9) cardFs = 9; // minimum font size
    }

    // How many active tasks fit at this font size
    const headerPx  = HEADER_EM * cardFs;
    const rowPx     = ROW_EM * cardFs;
    const totalFits = Math.max(2, Math.floor((cardH - headerPx) / rowPx));
    const maxActive = Math.max(2, totalFits - doneRows);

    const shownActive  = activeTasks.slice(0, maxActive);
    const hiddenActive = activeTasks.length - shownActive.length;
    const shownDone    = doneTasks; // show all done tasks from today

    const card = document.createElement('div');
    card.className = 'person-card';
    card.style.cssText = `border-top-color:${color}; background:${color}14; animation-delay:${idx*45}ms; overflow:hidden; height:100%; display:flex; flex-direction:column; font-size:${cardFs}px;`;

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'card-header';
    hdr.style.borderBottomColor = color + '30';

    const nameEl = document.createElement('div');
    nameEl.className = 'card-name';
    nameEl.style.color = color;
    nameEl.textContent = name;

    const badges = document.createElement('div');
    badges.className = 'card-badges';

    // Overdue badge — red
    if (overdueCnt > 0) {
      const ob = document.createElement('span');
      ob.className = 'badge-overdue';
      ob.textContent = overdueCnt + ' overdue';
      badges.appendChild(ob);
    }
    // Due today / do_today badge — blue
    if (todayCnt > 0) {
      const ab = document.createElement('span');
      ab.className = 'badge-active';
      ab.textContent = todayCnt + ' today';
      badges.appendChild(ab);
    }
    // Tomorrow badge — amber
    if (tomorrowCnt > 0) {
      const tb = document.createElement('span');
      tb.className = 'badge-tomorrow';
      tb.textContent = tomorrowCnt + ' tomorrow';
      badges.appendChild(tb);
    }
    // Future badge — muted
    if (futureCnt > 0) {
      const fb = document.createElement('span');
      fb.className = 'badge-future';
      fb.textContent = futureCnt + ' future';
      badges.appendChild(fb);
    }

    hdr.appendChild(nameEl); hdr.appendChild(badges);
    card.appendChild(hdr);

    const taskList = document.createElement('div');
    taskList.className = 'card-tasks';
    taskList.style.cssText = 'flex:1; overflow:hidden; min-height:0; padding-bottom:0.5em;';

    shownActive.forEach(t => taskList.appendChild(makeTaskRow(t, color, today)));

    if (hiddenActive > 0) {
      const more = document.createElement('div');
      more.className = 'more-indicator';
      more.textContent = '+ ' + hiddenActive + ' more (see app)';
      taskList.appendChild(more);
    }

    if (shownDone.length > 0) {
      const div = document.createElement('div');
      div.className = 'done-divider';
      div.textContent = 'Recently done';
      taskList.appendChild(div);
      shownDone.forEach(t => taskList.appendChild(makeTaskRow(t, color, today)));
    }

    card.appendChild(taskList);
    grid.appendChild(card);
  });
}

function makeTaskRow(task, color, today) {
  const isOverdue  = task.due_date && new Date(task.due_date+'T00:00:00') < today && task.status !== 'Done';
  const isDone     = task.status === 'Done';
  const isProgress = task.status === 'In Progress';

  const row = document.createElement('div');
  row.className = 'task-row ' + (isOverdue?'t-overdue':isDone?'t-done':isProgress?'t-progress':'t-normal');

  const dot = document.createElement('div');
  dot.className = 't-dot';
  dot.style.background = isOverdue?'#ef4444':isDone?'#10b981':isProgress?'#3b82f6':color;
  row.appendChild(dot);

  const body = document.createElement('div');
  body.className = 't-body';
  const nm = document.createElement('div');
  nm.className = 't-name' + (isDone?' done':'');
  nm.textContent = task.task_name;
  body.appendChild(nm);

  const meta = document.createElement('div');
  meta.className = 't-meta';
  if (task.bus) {
    const b = document.createElement('span');
    b.className = 't-bus';
    b.textContent = '🚌 ' + task.bus;
    meta.appendChild(b);
  }
  if (isOverdue && task.due_date) {
    const d = document.createElement('span');
    d.className = 't-due';
    d.textContent = 'Due ' + new Date(task.due_date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
    meta.appendChild(d);
  }
  if (meta.children.length) body.appendChild(meta);
  row.appendChild(body);

  const right = document.createElement('div');
  right.className = 't-right';
  if (isOverdue) {
    const f = document.createElement('div'); f.className = 't-flag'; f.textContent = '!'; right.appendChild(f);
  } else if (!isDone) {
    const s = document.createElement('div');
    s.className = 't-status ' + (task.status==='In Progress'?'s-progress':task.status==='On Hold'?'s-hold':'s-todo');
    s.textContent = task.status==='In Progress'?'In Progress':task.status==='On Hold'?'On Hold':task.status;
    right.appendChild(s);
  }
  if (right.children.length) row.appendChild(right);
  return row;
}

// ── API ──
async function fetchData() {
  const r = await fetch(API, {
    method:'POST', headers:{'Content-Type':'text/plain'},
    body: JSON.stringify({ action:'getDashboardData' }), redirect:'follow'
  });
  const txt = await r.text();
  try { return JSON.parse(txt); }
  catch { const m=txt.match(/\{[\s\S]*\}/); if(m) return JSON.parse(m[0]); throw new Error('Bad response'); }
}

// ── LOAD & REFRESH ──
async function load(isRefresh) {
  if (!isRefresh) {
    document.getElementById('loadingScreen').classList.remove('hide');
    document.getElementById('errorScreen').classList.remove('show');
  }
  try {
    const data = await fetchData();
    lastRaw = (data && data.data) ? data.data : data;
    document.getElementById('loadingScreen').classList.add('hide');
    document.getElementById('errorScreen').classList.remove('show');
    render(lastRaw);
    document.getElementById('lastUpdated').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    clearTimeout(refreshTimer); clearTimeout(retryTimer);
    refreshTimer = setTimeout(() => load(true), REFRESH);
  } catch(e) {
    console.error(e);
    document.getElementById('loadingScreen').classList.add('hide');
    if (!isRefresh) document.getElementById('errorScreen').classList.add('show');
    startRetry();
  }
}

function startRetry() {
  let s = 30; clearTimeout(retryTimer);
  const el = document.getElementById('retryCountdown');
  const t = () => { if(s<=0){load(false);return;} if(el)el.textContent=s; s--; retryTimer=setTimeout(t,1000); };
  t();
}

// Re-render on window resize (handles if Pi resolution changes)
window.addEventListener('resize', () => { if (lastRaw) render(lastRaw); });

load(false);
</script>
